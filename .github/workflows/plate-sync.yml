name: Daily Plate Sync (Live) v2.1

on:
  # 2026-06-19: 移除 GitHub 內建 schedule，改由外部 cronjob 經 workflow_dispatch 觸發（時間較準）。
  # 原因：GitHub schedule 會延遲數小時，且與外部 cronjob 雙重觸發同一 concurrency group，
  # 造成「Canceling since a higher priority waiting request」連鎖取消、全面癱瘓。
  workflow_dispatch: {}

# Prevent multiple workflow runs from overlapping and corrupting the staging table
concurrency:
  group: plate-sync-workflow
  cancel-in-progress: false

permissions:
  contents: read # checkout 需要
  actions: read  # guard 需要查詢執行中的 run

jobs:
  # 「跳過重複觸發」閘門（2026-06-19 新增）：
  # cron-job.org 固定每 20 分觸發一次，正常 run 約 10~15 分跑完、不會重疊。
  # 但偶爾單次 run 會超過 20 分鐘，這時下一輪觸發進來，若放任排隊就會互相取消（連鎖癱瘓）。
  # 解法：每個新 run 先檢查是否已有另一個 run 正在執行；有的話這一輪直接跳過——
  # 不排隊、也不打斷正在跑的（保護 staging table），等下一個 20 分週期即可。
  # 注意：每次觸發仍會建立一個 run（可確認觸發正常），只是重複的那個會秒跳過。
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Skip if another run is already in progress
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/plate-sync.yml/runs?status=in_progress&per_page=100" \
            --jq '.total_count' 2>/dev/null || echo "")
          echo "目前 in_progress 的 run 數（含自己）：${COUNT:-查詢失敗}"
          if [ -z "$COUNT" ]; then
            echo "::warning::無法查詢執行中的 run（API 失敗），保險起見照常執行。"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$COUNT" -gt 1 ]; then
            echo "::notice::已有另一輪 plate-sync 在執行，跳過這一輪以避免互踩。"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  sync-plates:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # 卡死的 shard 最多跑 45 分鐘就被砍，避免霸佔 concurrency slot（GitHub 預設 360 分=6 小時）。
    # 45 分是依歷史成功耗時（11~49 分）抓的上限：不誤殺正常慢 run，又能及早終結 hang。
    timeout-minutes: 45
    strategy:
      matrix:
        # 2026-07-05: 3→5 分片重構，站點配載見 lib/shard-config.cjs / supabase/migrations-draft/shard_5way_mvdis_stations.sql
        shard: [NORTH, CENTRAL, SOUTH, SHARD4, SHARD5]
      fail-fast: false # Let other shards finish even if one fails
    
    concurrency:
      group: plate-sync-shard-${{ matrix.shard }}
      cancel-in-progress: false

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Cloudflare WARP apt packages
        id: cache-warp-apt
        uses: actions/cache@v4
        with:
          path: ~/.warp-apt-cache
          key: warp-apt-${{ runner.os }}-v1
          restore-keys: |
            warp-apt-${{ runner.os }}-

      - name: Install and Configure Cloudflare WARP
        run: |
          # Import GPG key and add repository
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list

          # 快取命中：把 .deb 複製進 apt archives，讓 apt-get install 跳過 119MB 下載
          # 快取未命中：此命令靜默失敗，走正常下載路徑
          sudo cp "$HOME/.warp-apt-cache/"*.deb /var/cache/apt/archives/ 2>/dev/null \
            && echo "Cache hit: restored .deb packages to apt archives." \
            || echo "Cache miss: packages will be downloaded fresh this run."

          # 保留 .deb 檔以供 actions/cache 在 job 結束時儲存
          echo 'APT::Keep-Downloaded-Packages "true";' | sudo tee /etc/apt/apt.conf.d/99keep-debs > /dev/null

          # Install WARP（快取命中時 apt-get install 略過下載，只驗證 + 解壓縮，約 30s）
          sudo apt-get update && sudo apt-get install -y cloudflare-warp

          # 將安裝好的 .deb 存到使用者可讀的目錄，供下一輪快取
          mkdir -p "$HOME/.warp-apt-cache"
          sudo cp /var/cache/apt/archives/*.deb "$HOME/.warp-apt-cache/" 2>/dev/null || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.warp-apt-cache"

          # Register (handle both old and new warp-cli syntax across versions)
          sudo warp-cli registration new --accept-tos 2>/dev/null || \
          sudo warp-cli --accept-tos registration new 2>/dev/null || true

          # Ultimate Stability: Resolve and Hardcode Supabase IP in /etc/hosts
          SUB_DOMAIN=$(echo ${{ secrets.VITE_SUPABASE_URL }} | sed -E 's/https?:\/\/([^\/]+).*/\1/')
          SUB_IP=$(nslookup $SUB_DOMAIN | grep 'Address:' | tail -n1 | awk '{print $2}')
          if [ ! -z "$SUB_IP" ]; then
            echo "Hardcoding Supabase IP: $SUB_IP for $SUB_DOMAIN in /etc/hosts"
            echo "$SUB_IP $SUB_DOMAIN" | sudo tee -a /etc/hosts

            echo "Excluding Supabase IP: $SUB_IP from WARP"
            sudo warp-cli add-excluded-route $SUB_IP/32 2>/dev/null || \
            sudo warp-cli --accept-tos add-excluded-route $SUB_IP/32 2>/dev/null || true
          fi

          # Connect
          sudo warp-cli connect 2>/dev/null || \
          sudo warp-cli --accept-tos connect 2>/dev/null || true

          # Wait for connection to stabilize
          echo "Waiting for WARP connection..."
          sleep 30

          # Verify connection status
          sudo warp-cli status 2>/dev/null || \
          sudo warp-cli --accept-tos status 2>/dev/null || true

      - name: Verify IP and MVDIS Connectivity
        run: |
          echo "=== IP / WARP Check ==="
          CURRENT_IP=$(curl -s --max-time 15 ifconfig.me || echo "FAILED")
          echo "Current IP: $CURRENT_IP"

          COUNTRY=$(curl -s --max-time 10 "https://ipinfo.io/${CURRENT_IP}/country" 2>/dev/null | tr -d '[:space:]' || echo "UNKNOWN")
          echo "IP Country: $COUNTRY"
          if [ "$COUNTRY" = "TW" ]; then
            echo "WARP verified: IP is from Taiwan"
          else
            echo "WARNING: IP country is $COUNTRY (expected TW). MVDIS may block requests."
          fi

          echo ""
          echo "=== MVDIS Connectivity Test ==="
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Accept-Language: zh-TW,zh;q=0.9" \
            "https://www.mvdis.gov.tw/m3-emv-plate/webpickno/queryPickNo" 2>/dev/null || echo "0")
          echo "MVDIS HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" = "0" ] || [ "$HTTP_STATUS" = "000" ]; then
            echo "::error::Cannot reach MVDIS (TCP failed). WARP may not be routing. Aborting."
            exit 1
          elif [ "$HTTP_STATUS" = "403" ] || [ "$HTTP_STATUS" = "429" ] || [ "$HTTP_STATUS" = "503" ]; then
            echo "::warning::MVDIS returned $HTTP_STATUS — IP may be blocked. curl passes but Chrome may be rejected."
          else
            echo "MVDIS is reachable (HTTP $HTTP_STATUS)"
          fi

          echo ""
          echo "=== Supabase Connectivity ==="
          for i in {1..5}; do
            curl -I -s --max-time 15 ${{ secrets.VITE_SUPABASE_URL }} && break || (echo "Retry $i failed..." && sleep 5)
          done || echo "Supabase direct connection failed"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Crawler Shard ${{ matrix.shard }}
        run: node gh-plate-sync.cjs --shard=${{ matrix.shard }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_NORTH: ${{ secrets.GEMINI_API_KEY_NORTH }}
          GEMINI_API_KEY_CENTRAL: ${{ secrets.GEMINI_API_KEY_CENTRAL }}
          GEMINI_API_KEY_SOUTH: ${{ secrets.GEMINI_API_KEY_SOUTH }}
          GEMINI_API_KEY_SHARD4: ${{ secrets.GEMINI_API_KEY_SHARD4 }}
          GEMINI_API_KEY_SHARD5: ${{ secrets.GEMINI_API_KEY_SHARD5 }}
          NODE_OPTIONS: '--dns-result-order=ipv4first'

  finalize-sync:
    needs: sync-plates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: success() # Only run if all shards succeeded
    concurrency:
      group: plate-sync-finalize
      cancel-in-progress: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Trigger Atomic Swap
        run: node trigger_swap.cjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}